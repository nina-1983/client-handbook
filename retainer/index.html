<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working With Me — Retainer Handbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Nunito:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#1c2530;color:#2d2a33;overflow:hidden}

:root{
  --accent:#e8304f;
  --accent-dark:#bf2340;
  --blue:#326ab3;
  --blue-dark:#274f87;
  --gold:#f4c82c;
  --mint:#85d0cd;
  --pink-soft:#f9d8da;
  --pink-pale:#f6c4c7;
  --cream:#faf6f1;
  --navy:#1c2530;
  --ink:#26303d;
  --muted:#7a8088;
}

/* Headline bar */
.headline{background:var(--navy);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06)}
.hl-title{font-family:'Playfair Display',serif;font-weight:600;font-size:14px;color:#faf6f1;letter-spacing:0.3px}
.hl-title em{font-style:italic;color:var(--mint)}
.hl-right{display:flex;align-items:center;gap:10px}
.hl-prog-bg{width:90px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.hl-prog-fill{height:100%;background:var(--mint);border-radius:2px;transition:width .4s ease}
.hl-count{font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.4px}

/* Book area */
.ba{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 16px;overflow:hidden;position:relative;background:var(--navy)}

.book-shell{width:100%;max-width:420px;height:100%;max-height:min(580px,82vh);position:relative;background:var(--cream);border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,0.35)}
.book-shell::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--mint),var(--pink-pale),var(--gold));z-index:20;pointer-events:none}

/* Real page-turn engine (StPageFlip) does the actual curling; we just style the page faces.
   In portrait/stretch mode, StPageFlip's internal coordinate space is two page-widths wide —
   the "previous page" half sits off to the left of the visible page and is only used while
   flipping backward. Clipping the shell with overflow:hidden hid that entire half, so a
   backward flip had nowhere visible to animate and just snapped straight to the end state.
   We clip per-page instead (see .page below) so the shell itself stays unclipped. */
#book{width:100%;height:100%}
.page{position:relative;background:var(--cream);overflow:hidden;border-radius:14px}

.pgn{position:absolute;bottom:14px;right:24px;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:#b9b2a4;z-index:4;letter-spacing:0.3px}

.p{padding:30px 28px 36px 28px;height:100%;overflow:hidden;position:relative;z-index:2;line-height:1.7;display:flex;flex-direction:column;justify-content:flex-start;gap:14px}
.cp{align-items:center;justify-content:center;text-align:center;padding:28px 30px 28px 30px}

.ptt{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(21px,3.5vw,25px);color:var(--ink);line-height:1.25;margin-bottom:2px}
.ptt em{font-style:italic;color:var(--accent)}

/* Cover */
.cb{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(133,208,205,0.45);background:rgba(133,208,205,0.1);border-radius:30px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:1px;color:#3d8d89;text-transform:uppercase;margin-bottom:10px}
.cb::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--mint)}
.ct{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,6vw,40px);color:var(--ink);line-height:1.08}
.ca{font-family:'Playfair Display',serif;font-weight:600;font-style:italic;font-size:clamp(28px,6vw,40px);color:var(--accent);line-height:1.08}
.cs{font-family:'Nunito',sans-serif;font-size:13.5px;color:#6b6575;line-height:1.7;max-width:300px;margin-top:14px}
.ch{margin-top:20px;text-align:left;max-width:300px;background:rgba(255,255,255,0.5);border-radius:10px;padding:16px 18px}
.cht{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
.chi{font-size:13px;line-height:1.85;color:#4a4555}

/* TOC */
.toc-page{justify-content:center;gap:0}
.toc-header{text-align:center;margin-bottom:18px}
.toc-eyebrow{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(232,48,79,0.3);background:rgba(232,48,79,0.06);border-radius:30px;padding:5px 13px;font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
.toc-title{font-family:'Playfair Display',serif;font-weight:700;font-size:24px;color:var(--ink)}
.toc-list{display:flex;flex-direction:column;justify-content:center}
.toc-row{display:flex;align-items:baseline;gap:0;padding:8px 6px;cursor:pointer;transition:background .12s;border-radius:6px;background:transparent;border:none;width:100%;text-align:left;font:inherit;color:inherit}
.toc-row:hover{background:rgba(133,208,205,0.1)}
.toc-num{font-family:'Playfair Display',serif;font-weight:700;font-size:11px;color:var(--accent);min-width:26px;flex-shrink:0}
.toc-label{font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;color:var(--ink);white-space:nowrap;flex-shrink:0}
.toc-fill{flex:1;margin:0 8px;border-bottom:1px dotted #ccc5bc;min-width:12px;position:relative;top:-3px}
.toc-pg{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:var(--accent);flex-shrink:0;text-align:right}

/* Page header */
.ph{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.pn{font-family:'Nunito',sans-serif;font-weight:800;font-size:10.5px;color:#fff;width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pl{font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.intro{font-size:13.5px;line-height:1.75;color:#4a4555}
.body-txt{font-size:13.5px;line-height:1.75;color:#3c3845}
.aside{font-family:'Nunito',sans-serif;font-weight:600;font-size:12.5px;line-height:1.6;color:#3d8d89;background:rgba(133,208,205,0.12);border-radius:8px;padding:12px 14px}

/* fact rows */
.fl{display:flex;flex-direction:column;gap:0}
.fr{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);font-size:13px;line-height:1.55;color:var(--ink)}
.fr:last-child{border-bottom:none}

/* number stat row */
.statrow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.statcard{border-radius:10px;background:rgba(255,255,255,0.55);padding:14px 14px}
.statn{font-family:'Playfair Display',serif;font-weight:700;font-size:20px;color:var(--accent)}
.statl{font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px}

/* highlight blocks */
.hb{background:rgba(50,106,179,0.08);border-radius:10px;padding:14px 16px}
.hb-l{font-family:'Nunito',sans-serif;font-weight:800;font-size:10.5px;letter-spacing:0.8px;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.hb-t{font-size:13px;line-height:1.65;color:#3c3845}

.gb{background:rgba(244,200,44,0.14);border-radius:10px;padding:14px 16px}
.gb-l{font-family:'Nunito',sans-serif;font-weight:800;font-size:10.5px;letter-spacing:0.8px;text-transform:uppercase;color:#a3780a;margin-bottom:6px}
.gb-t{font-size:13px;line-height:1.65;color:#3c3845}

.pb{background:rgba(232,48,79,0.07);border-radius:10px;padding:14px 16px}
.pb-l{font-family:'Nunito',sans-serif;font-weight:800;font-size:10.5px;letter-spacing:0.8px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.pb-t{font-size:13px;line-height:1.65;color:#3c3845}

/* quick reference table */
.qr{border-radius:10px;background:rgba(255,255,255,0.55);overflow:hidden}
.qrr{display:flex;justify-content:space-between;align-items:baseline;padding:11px 16px;border-bottom:1px solid rgba(0,0,0,0.06);gap:10px}
.qrr:last-child{border-bottom:none}
.qrk{font-size:12.5px;color:#4a4555;flex:1}
.qrv{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:var(--accent);text-align:right;flex-shrink:0}

/* Final CTA */
.fc{background:rgba(255,255,255,0.55);border-radius:14px;padding:28px 22px;text-align:center}
.fct{font-family:'Playfair Display',serif;font-weight:600;font-size:20px;color:var(--ink);margin-bottom:8px}
.fcs{font-size:13px;color:#6b6575;max-width:280px;margin:0 auto;line-height:1.65}
.cta-btn{display:inline-flex;align-items:center;gap:5px;background:var(--gold);color:#3a2c00;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:13px 28px;border:none;border-radius:30px;cursor:pointer;text-decoration:none;transition:all .15s;letter-spacing:0.2px;margin-top:18px}
.cta-btn:hover{background:#e0b91a}

.bf-photo{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;border:3px solid rgba(255,255,255,0.7);box-shadow:0 4px 14px rgba(0,0,0,0.12)}
.bf{text-align:center;padding:18px 0 0;margin-top:auto}
.bfb{font-family:'Playfair Display',serif;font-weight:600;font-size:13px;color:var(--ink)}
.bfs{font-size:10.5px;color:var(--muted);margin-top:4px}
.bfc{font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#c9c2d0;margin-top:8px}

/* Nav */
.nav{background:var(--navy);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.05)}
.nb{font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;padding:9px 20px;border:none;border-radius:30px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;letter-spacing:0.3px}
.nb.pr{background:transparent;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.18)}
.nb.pr:hover{background:rgba(255,255,255,0.08);color:#faf6f1}
.nb.nx{background:var(--blue);color:#fff}
.nb.nx:hover{background:var(--blue-dark)}
.nb:disabled{opacity:.25;cursor:default;pointer-events:none}
.dots{display:flex;gap:3px;align-items:center;flex-wrap:wrap;max-width:50%;justify-content:center}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.1);cursor:pointer;border:none;padding:0;transition:all .2s}
.dot:hover{background:rgba(255,255,255,0.2)}
.dot.on{background:var(--mint);width:14px;border-radius:3px}

@media(max-width:520px){
  .p{padding:20px 18px 28px 18px;gap:10px}
  .cp{padding:20px 18px 20px 18px}
  .ba{padding:6px 6px}
  .nb{padding:8px 14px;font-size:10px}
  .dots{gap:2px}
  .dot{width:4px;height:4px}
  .dot.on{width:10px}
  .ptt{font-size:18px}
  .ct,.ca{font-size:27px}
  .statrow{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="headline">
  <div class="hl-title">Working <em>With Me</em></div>
  <div class="hl-right">
    <div class="hl-prog-bg"><div class="hl-prog-fill" id="progFill"></div></div>
    <div class="hl-count" id="progCount">1 / 13</div>
  </div>
</div>

<div class="ba">
  <div class="book-shell">
    <div id="book"></div>
  </div>
</div>

<div class="nav">
  <button class="nb pr" id="btnBack">← Back</button>
  <div class="dots" id="dots"></div>
  <button class="nb nx" id="btnNext">Next →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
<script>
let pg = 0;

const pages = [

// 0 COVER
`<div class="p cp">
  <div class="cb">retainer handbook</div>
  <div class="ct">Working</div>
  <div class="ca">With Me</div>
  <div class="cs">The plain-English guide to how we work together. Read it once, keep it for whenever you need it.</div>
  <div class="ch">
    <div class="cht">Quick tour</div>
    <div class="chi">Flip through with the arrows or the dots</div>
    <div class="chi">Jump anywhere from the contents page</div>
    <div class="chi">Save this, you'll want it again</div>
  </div>
</div>`,

// 1 TOC
`<div class="p toc-page">
  <div class="toc-header">
    <div class="toc-eyebrow">Contents</div>
    <div class="toc-title">What's inside</div>
  </div>
  <div class="toc-list"></div>
</div>`,

// 2 WELCOME
`<div class="p">
  <div class="ph"><div class="pn">01</div><div class="pl">Welcome</div></div>
  <h2 class="ptt">Glad you're <em>here</em></h2>
  <p class="intro">You've signed on for a retainer with me, and that's honestly the easy part.</p>
  <p class="body-txt">This little handbook covers how we actually work day to day: how to reach me, what to expect back, and the practical stuff around payment.</p>
  <div class="aside">Same handful of working agreements I use with every retainer client, just written down so neither of us has to guess.</div>
</div>`,

// 3 SESSIONS
`<div class="p">
  <div class="ph"><div class="pn">02</div><div class="pl">How we work</div></div>
  <h2 class="ptt">Your <em>sessions</em></h2>
  <p class="intro">Your retainer includes 10 hours of tech support each month. Minimum term, 3 months. That's the deal.</p>
  <div class="statrow">
    <div class="statcard"><div class="statn">10 hrs</div><div class="statl">Tech support, per month</div></div>
    <div class="statcard"><div class="statn">3 months</div><div class="statl">Minimum term</div></div>
  </div>
  <p class="body-txt">Anything bigger, a new build, a one-off project, gets quoted separately before I start. No surprise invoices, ever.</p>
</div>`,

// 4 COMMUNICATION
`<div class="p">
  <div class="ph"><div class="pn">03</div><div class="pl">Communication</div></div>
  <h2 class="ptt">How to <em>reach me</em></h2>
  <p class="intro">Email's the main channel: <strong>nina@nina-mistry.com</strong>. I reply within 3 working days.</p>
  <div class="hb">
    <div class="hb-l">Genuinely urgent?</div>
    <div class="hb-t">You've got my WhatsApp for that: <strong>+44 7537 144979</strong>, save the number. Everyday stuff lives in our shared Google Sheet plus email, so nothing gets lost in a scroll-back.</div>
  </div>
  <div class="gb">
    <div class="gb-l">Call recordings</div>
    <div class="gb-t">I record our calls, not for show, just so we both remember what was actually said and agreed. Keeps things moving and stays completely confidential between us.</div>
  </div>
</div>`,

// 5 PAYMENT
`<div class="p">
  <div class="ph"><div class="pn">04</div><div class="pl">Payment</div></div>
  <h2 class="ptt">How <em>payment</em> works</h2>
  <p class="intro">Invoices are due within 7 days, by bank transfer, in GBP.</p>
  <div class="statrow">
    <div class="statcard"><div class="statn">7 days</div><div class="statl">To pay an invoice</div></div>
    <div class="statcard"><div class="statn">GBP</div><div class="statl">Bank transfer only</div></div>
  </div>
  <p class="body-txt">Running properly late might mean a gentle nudge from me, but honestly, neither of us wants to go there. Pay within the week and it's a total non-issue.</p>
</div>`,

// 6 ENDING
`<div class="p">
  <div class="ph"><div class="pn">05</div><div class="pl">If things change</div></div>
  <h2 class="ptt">Changing your <em>mind</em></h2>
  <p class="intro">After the 3 month minimum, either of us can end things with 30 days' written notice. No drama.</p>
  <div class="fl">
    <div class="fr">Anything already paid, deposits, set-up fees, prepaid work, isn't refunded.</div>
    <div class="fr">You're still on the hook for fees across any minimum term already committed to.</div>
  </div>
  <div class="gb">
    <div class="gb-l">New task notice</div>
    <div class="gb-t">New day-to-day requests now need 48 hours' notice, so nothing's rushed and I can plan around it properly. Genuine "tech's on fire" emergencies always jump the queue. Questions, just ask.</div>
  </div>
</div>`,

// 7 CONFIDENTIALITY
`<div class="p">
  <div class="ph"><div class="pn">06</div><div class="pl">Confidentiality &amp; IP</div></div>
  <h2 class="ptt">What stays <em>between us</em></h2>
  <p class="intro">Anything you share with me stays confidential, during our work together and for a year after it ends.</p>
  <p class="body-txt">I won't pass it to anyone else unless you've agreed to it, it's needed to deliver the work, it's already public, or I'm legally required to. All covered formally in our NDA.</p>
</div>`,

// 8 OWNERSHIP
`<div class="p">
  <div class="ph"><div class="pn">06</div><div class="pl">Confidentiality &amp; IP</div></div>
  <h2 class="ptt">Who <em>owns</em> what</h2>
  <p class="intro">I retain the intellectual property in anything I build or supply.</p>
  <p class="body-txt">Once you've paid in full, you get a worldwide licence to use it for the purpose we agreed, for as long as we've agreed it for.</p>
  <div class="hb">
    <div class="hb-l">Data protection</div>
    <div class="hb-t">You're the controller of any personal data you give me, I'm the processor. We both stay accountable to UK GDPR for our side of that.</div>
  </div>
</div>`,

// 9 BOUNDARIES
`<div class="p">
  <div class="ph"><div class="pn">07</div><div class="pl">Boundaries</div></div>
  <h2 class="ptt">My <em>boundaries</em></h2>
  <p class="intro">I won't answer outside my working hours. Simple as that.</p>
  <p class="body-txt">WhatsApp and email both get answered within my normal time frames. If I can't get to something, or there's a delay, you'll be told why, not left wondering.</p>
  <div class="pb">
    <div class="pb-l">Why it matters</div>
    <div class="pb-t">I value my time, the same way I value yours.</div>
  </div>
</div>`,

// 10 COMPLAINTS
`<div class="p">
  <div class="ph"><div class="pn">07</div><div class="pl">Boundaries</div></div>
  <h2 class="ptt">If something's <em>wrong</em></h2>
  <p class="intro">Tell me directly and early, that's the fastest way to fix it.</p>
  <p class="body-txt">Most things sort themselves out with a quick message. If it ever needs to go further, there's a proper Complaints Policy at nina-mistry.com, but honestly, I'd rather hear it from you first and sort it out like adults, no drama, no silent treatment.</p>
</div>`,

// 11 QUICK REFERENCE
`<div class="p">
  <div class="ph"><div class="pn">08</div><div class="pl">Quick reference</div></div>
  <h2 class="ptt">The <em>numbers</em>, at a glance</h2>
  <div class="qr">
    <div class="qrr"><span class="qrk">Monthly support hours</span><span class="qrv">10 hrs</span></div>
    <div class="qrr"><span class="qrk">Minimum term</span><span class="qrv">3 months</span></div>
    <div class="qrr"><span class="qrk">Email response time</span><span class="qrv">3 working days</span></div>
    <div class="qrr"><span class="qrk">Invoice payment due</span><span class="qrv">7 days</span></div>
    <div class="qrr"><span class="qrk">Notice to end</span><span class="qrv">30 days</span></div>
  </div>
  <div class="aside">Working days = Monday to Thursday, bank holidays excluded. Urgent? WhatsApp beats email.</div>
</div>`,

// 12 CLOSING
`<div class="p cp">
  <div class="fc">
    <div class="fct">That's everything</div>
    <div class="fcs">Save this somewhere good. Questions, anything at all, just shout, email or WhatsApp both work.</div>
    <a href="mailto:nina@nina-mistry.com" class="cta-btn">nina@nina-mistry.com</a>
  </div>
  <div class="bf">
    <img class="bf-photo" src="https://nina-mistry.com/photo-about.jpg" alt="Nina Mistry">
    <div class="bfb">Nina Mistry</div>
    <div class="bfs">nina-mistry.com · 07736 278718</div>
    <div class="bfc">Retainer handbook</div>
  </div>
</div>`

];

const TP = pages.length;

const tocItems = [
  { num: "01", label: "Welcome", pgIdx: 2 },
  { num: "02", label: "Your Sessions", pgIdx: 3 },
  { num: "03", label: "How To Reach Me", pgIdx: 4 },
  { num: "04", label: "How Payment Works", pgIdx: 5 },
  { num: "05", label: "If Things Change", pgIdx: 6 },
  { num: "06", label: "Confidentiality", pgIdx: 7 },
  { num: "07", label: "Who Owns What", pgIdx: 8 },
  { num: "08", label: "My Boundaries", pgIdx: 9 },
  { num: "09", label: "If Something's Wrong", pgIdx: 10 },
  { num: "10", label: "Quick Reference", pgIdx: 11 },
];

const bookEl = document.getElementById('book');
const dotsEl = document.getElementById('dots');
const btnBack = document.getElementById('btnBack');
const btnNext = document.getElementById('btnNext');
const progFill = document.getElementById('progFill');
const progCount = document.getElementById('progCount');

function fillTOC(container) {
  const list = container.querySelector('.toc-list');
  if (!list) return;
  list.innerHTML = '';
  tocItems.forEach(item => {
    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'toc-row';
    row.innerHTML = `<span class="toc-num">${item.num}</span><span class="toc-label">${item.label}</span><span class="toc-fill"></span><span class="toc-pg">${item.pgIdx + 1}</span>`;
    row.addEventListener('click', () => pageFlip.flip(item.pgIdx));
    list.appendChild(row);
  });
}

// Build one real page element per page, each carrying its own footer page number
pages.forEach((html, i) => {
  const pageEl = document.createElement('div');
  pageEl.className = 'page';
  pageEl.innerHTML = html + `<div class="pgn">${i + 1} / ${TP}</div>`;
  bookEl.appendChild(pageEl);
});
fillTOC(bookEl.children[1]);

for (let i = 0; i < TP; i++) {
  const b = document.createElement('button');
  b.className = 'dot';
  b.addEventListener('click', () => pageFlip.flip(i));
  dotsEl.appendChild(b);
}

function updateChrome() {
  progCount.textContent = `${pg + 1} / ${TP}`;
  progFill.style.width = `${((pg + 1) / TP) * 100}%`;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === pg));
  btnBack.disabled = pg === 0;
  btnNext.disabled = pg === TP - 1;
  btnNext.textContent = pg === 0 ? 'Open →' : 'Next →';
}

// Real page-turn engine: genuinely curls and bends each page like paper
const pageFlip = new St.PageFlip(bookEl, {
  width: 380,
  height: 560,
  size: 'stretch',
  minWidth: 260,
  maxWidth: 700,
  minHeight: 360,
  maxHeight: 1000,
  maxShadowOpacity: 0.5,
  showCover: false,
  usePortrait: true,
  flippingTime: 650,
  clickEventForward: true
});

pageFlip.loadFromHTML(document.querySelectorAll('#book .page'));

pageFlip.on('flip', (e) => {
  pg = e.data;
  updateChrome();
});

pageFlip.on('changeState', (e) => {
  const busy = e.data === 'flipping';
  btnBack.disabled = busy || pg === 0;
  btnNext.disabled = busy || pg === TP - 1;
});

btnBack.addEventListener('click', () => pageFlip.flipPrev('bottom'));
btnNext.addEventListener('click', () => pageFlip.flipNext());
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') pageFlip.flipNext();
  if (e.key === 'ArrowLeft') pageFlip.flipPrev('bottom');
});

updateChrome();
</script>
</body>
</html>
